services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-antragsgruen}
      MYSQL_USER: ${DB_USER:-antragsgruen}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 5

  php-fpm:
    build:
      context: ../php-fpm
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-antragsgruen}
      DB_USER: ${DB_USER:-antragsgruen}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_DOMAIN: ${APP_DOMAIN:-localhost:8080}
      APP_PROTOCOL: ${APP_PROTOCOL:-http}
      MULTISITE_MODE: ${MULTISITE_MODE:-false}
      BASE_LANGUAGE: ${BASE_LANGUAGE:-en}
      RANDOM_SEED: ${RANDOM_SEED}
      MAILER_DSN: ${MAILER_DSN:-smtp://mailpit:1025}
      MAIL_FROM_EMAIL: ${MAIL_FROM_EMAIL:-noreply@localhost}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Antragsgruen}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      # Single-site configuration
      SITE_SUBDOMAIN: ${SITE_SUBDOMAIN:-std}
      SITE_TITLE: ${SITE_TITLE:-Demo Site}
      CONSULTATION_PATH: ${CONSULTATION_PATH:-main}
      CONSULTATION_TITLE: ${CONSULTATION_TITLE:-Main Consultation}
      CONSULTATION_TITLE_SHORT: ${CONSULTATION_TITLE_SHORT:-Main}
    volumes:
      - app_web:/var/www/html/web
      - app_runtime:/var/www/html/runtime
    healthcheck:
      test: ["CMD-SHELL", "cgi-fcgi -bind -connect 127.0.0.1:9000 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s

  nginx:
    build:
      context: ../nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      php-fpm:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:80"
    environment:
      PHP_FPM_HOST: php-fpm
      PHP_FPM_PORT: 9000
      NGINX_SERVER_NAME: ${APP_DOMAIN:-_}
      NGINX_CLIENT_MAX_BODY_SIZE: 32M
      NGINX_FASTCGI_READ_TIMEOUT: 300s
      NGINX_FASTCGI_SEND_TIMEOUT: 300s
      NGINX_FASTCGI_CONNECT_TIMEOUT: 60s
      WAIT_FOR_PHP_FPM: "true"
    volumes:
      - app_web:/var/www/html/web:ro
      - app_runtime:/var/www/html/runtime:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_WEB_PORT:-8025}:8025"
    profiles:
      - dev

volumes:
  db_data:
  redis_data:
  app_web:
  app_runtime:
