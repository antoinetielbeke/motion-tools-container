apiVersion: apps/v1
kind: Deployment
metadata:
  name: motion-tools-php
  namespace: motion-tools
  labels:
    app: motion-tools
    component: php-fpm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: motion-tools
      component: php-fpm
  template:
    metadata:
      labels:
        app: motion-tools
        component: php-fpm
    spec:
      containers:
      - name: php-fpm
        image: ghcr.io/your-org/motion-tools-php:v4.17-volt
        ports:
        - containerPort: 9000
        envFrom:
        - configMapRef:
            name: motion-tools-config
        - secretRef:
            name: motion-tools-secrets
        volumeMounts:
        - name: runtime
          mountPath: /var/www/html/runtime
        - name: assets
          mountPath: /var/www/html/web/assets
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 1Gi
        livenessProbe:
          tcpSocket:
            port: 9000
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 9000
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: runtime
        persistentVolumeClaim:
          claimName: motion-tools-runtime
      - name: assets
        persistentVolumeClaim:
          claimName: motion-tools-assets
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: motion-tools-nginx
  namespace: motion-tools
  labels:
    app: motion-tools
    component: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: motion-tools
      component: nginx
  template:
    metadata:
      labels:
        app: motion-tools
        component: nginx
    spec:
      containers:
      - name: nginx
        image: ghcr.io/your-org/motion-tools-nginx:v4.17-volt
        ports:
        - containerPort: 80
        env:
        - name: PHP_FPM_HOST
          value: "motion-tools-php-service"
        - name: PHP_FPM_PORT
          value: "9000"
        - name: NGINX_SERVER_NAME
          value: "motion.example.com"
        - name: NGINX_CLIENT_MAX_BODY_SIZE
          value: "32M"
        - name: NGINX_FASTCGI_READ_TIMEOUT
          value: "300s"
        - name: NGINX_FASTCGI_SEND_TIMEOUT
          value: "300s"
        - name: NGINX_FASTCGI_CONNECT_TIMEOUT
          value: "60s"
        volumeMounts:
        - name: assets
          mountPath: /var/www/html/web/assets
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: assets
        persistentVolumeClaim:
          claimName: motion-tools-assets
