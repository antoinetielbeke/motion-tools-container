apiVersion: v1
kind: Secret
metadata:
  name: motion-tools-secrets
  namespace: motion-tools
type: Opaque
stringData:
  DB_PASSWORD: "changeme"
  DB_ROOT_PASSWORD: "changeme-root"
  RANDOM_SEED: "generate-with-openssl-rand-base64-32"
  MAILER_DSN: "smtp://user:pass@smtp.example.com:587"
  REDIS_PASSWORD: ""
  # OIDC Configuration (sensitive)
  # OIDC_CLIENT_ID: "your-client-id"
  # OIDC_CLIENT_SECRET: "your-client-secret"
  # OIDC_GROUP_MAPPING: '{"idp-admins":"admin","idp-users":"user"}'
