apiVersion: v1
kind: ConfigMap
metadata:
  name: motion-tools-config
  namespace: motion-tools
data:
  APP_DOMAIN: "motion.example.com"
  APP_PROTOCOL: "https"
  BASE_LANGUAGE: "en"
  MULTISITE_MODE: "false"
  DB_HOST: "mariadb"
  DB_NAME: "antragsgruen"
  DB_USER: "antragsgruen"
  DB_PORT: "3306"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  RUN_MIGRATIONS: "true"
  MAIL_FROM_EMAIL: "noreply@motion.example.com"
  MAIL_FROM_NAME: "Motion Tools"
  # OIDC Configuration (non-sensitive)
  OIDC_ENABLED: "false"
  # OIDC_ISSUER: "https://keycloak.example.com/realms/myrealm"
  # OIDC_SCOPES: "openid,profile,email"
  # OIDC_PKCE: "true"
  # OIDC_SINGLE_LOGOUT: "true"
  # OIDC_SYNC_GROUPS: "false"
  # OIDC_DISCOVERY: "true"
  # OIDC_ATTR_EMAIL: "email"
  # OIDC_ATTR_USERNAME: "preferred_username"
  # OIDC_ATTR_GIVEN_NAME: "given_name"
  # OIDC_ATTR_FAMILY_NAME: "family_name"
  # OIDC_ATTR_GROUPS: "groups"
