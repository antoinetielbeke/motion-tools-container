name: Build NGINX Container

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
    paths:
      - 'nginx/**'
      - '.github/workflows/build-nginx.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'nginx/**'
      - '.github/workflows/build-nginx.yml'
  workflow_dispatch:
    inputs:
      antragsgruen_version:
        description: 'Antragsgruen version tag (e.g., v4.12.4)'
        required: true
        default: 'v4.12.4'

env:
  CLOUDSMITH_REGISTRY: docker.cloudsmith.io
  CLOUDSMITH_NAMESPACE: tielbeke/tielbeke
  IMAGE_NAME: motion-tools-nginx

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to Cloudsmith Docker Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CLOUDSMITH_REGISTRY }}
          username: ${{ secrets.CLOUDSMITH_USERNAME }}
          password: ${{ secrets.CLOUDSMITH_API_KEY }}

      - name: Extract Antragsgruen version
        id: antragsgruen
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.antragsgruen_version }}" >> $GITHUB_OUTPUT
          else
            # Extract from Dockerfile or use default
            VERSION=$(grep -oP 'ARG ANTRAGSGRUEN_VERSION=\K.*' nginx/Dockerfile | head -1 || echo "v4.12.4")
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Extract container version
        id: container
        run: |
          # Extract container version from git tag if available
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            # Expected format: v4.12.4+1 or 4.12.4+1
            if [[ $TAG =~ \+([0-9]+)$ ]]; then
              CONTAINER_VERSION="${BASH_REMATCH[1]}"
              echo "version=${CONTAINER_VERSION}" >> $GITHUB_OUTPUT
            else
              echo "version=1" >> $GITHUB_OUTPUT
            fi
          else
            echo "version=1" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.CLOUDSMITH_REGISTRY }}/${{ env.CLOUDSMITH_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.antragsgruen.outputs.version }}+${{ steps.container.outputs.version }}
            type=raw,value=${{ steps.antragsgruen.outputs.version }},enable=${{ steps.container.outputs.version == '1' }}
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.description=NGINX container for Antragsgruen
            org.opencontainers.image.vendor=tielbeke
            org.opencontainers.image.version=${{ steps.antragsgruen.outputs.version }}+${{ steps.container.outputs.version }}
            io.cloudsmith.package.antragsgruen-version=${{ steps.antragsgruen.outputs.version }}
            io.cloudsmith.package.container-version=${{ steps.container.outputs.version }}

      - name: Build and push to Cloudsmith
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ANTRAGSGRUEN_VERSION=${{ steps.antragsgruen.outputs.version }}
            NGINX_VERSION=1.29-alpine3.22-otel
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
