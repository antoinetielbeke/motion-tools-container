name: Build NGINX Container

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'nginx/**'
      - '.github/workflows/build-nginx.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'nginx/**'
      - '.github/workflows/build-nginx.yml'
  workflow_dispatch:
    inputs:
      antragsgruen_version:
        description: 'Antragsgruen version tag (e.g., v4.17-volt)'
        required: true
        default: 'v4.17-volt'

env:
  CLOUDSMITH_REGISTRY: docker.cloudsmith.io
  CLOUDSMITH_NAMESPACE: tielbeke/tielbeke
  IMAGE_NAME: motion-tools-nginx

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Cloudsmith Docker Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CLOUDSMITH_REGISTRY }}
          username: ${{ secrets.CLOUDSMITH_USERNAME }}
          password: ${{ secrets.CLOUDSMITH_API_KEY }}

      - name: Extract Antragsgruen version
        id: antragsgruen
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.antragsgruen_version }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep -oP 'ARG ANTRAGSGRUEN_VERSION=\K.*' nginx/Dockerfile | head -1 || echo "v4.17-volt")
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.CLOUDSMITH_REGISTRY }}/${{ env.CLOUDSMITH_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.description=NGINX container for Antragsgruen with OpenTelemetry support
            org.opencontainers.image.version={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ANTRAGSGRUEN_VERSION=${{ steps.antragsgruen.outputs.version }}
            NGINX_VERSION=1.27-alpine-otel
          cache-from: type=gha
          cache-to: type=gha,mode=max
