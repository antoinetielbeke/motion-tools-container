name: Build NGINX Container

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
    paths:
      - 'nginx/**'
      - '.github/workflows/build-nginx.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'nginx/**'
      - '.github/workflows/build-nginx.yml'
  workflow_dispatch:
    inputs:
      antragsgruen_version:
        description: 'Antragsgruen version tag (e.g., v4.12.4)'
        required: true
        default: 'v4.12.4'

env:
  IMAGE_NAME: motion-tools-nginx

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Extract Antragsgruen version
        id: antragsgruen
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.antragsgruen_version }}" >> $GITHUB_OUTPUT
          else
            # Extract from Dockerfile or use default
            VERSION=$(grep -oP 'ARG ANTRAGSGRUEN_VERSION=\K.*' nginx/Dockerfile | head -1 || echo "v4.12.4")
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Extract container version
        id: container
        run: |
          # Extract container version from git tag if available
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            # Expected format: v4.12.4+1 or 4.12.4+1
            if [[ $TAG =~ \+([0-9]+)$ ]]; then
              CONTAINER_VERSION="${BASH_REMATCH[1]}"
              echo "version=${CONTAINER_VERSION}" >> $GITHUB_OUTPUT
            else
              echo "version=1" >> $GITHUB_OUTPUT
            fi
          else
            echo "version=1" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          load: false
          tags: ${{ env.IMAGE_NAME }}:${{ steps.antragsgruen.outputs.version }}+${{ steps.container.outputs.version }}
          build-args: |
            ANTRAGSGRUEN_VERSION=${{ steps.antragsgruen.outputs.version }}
            NGINX_VERSION=1.29-alpine3.22-otel
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          outputs: type=docker,dest=/tmp/${{ env.IMAGE_NAME }}.tar

      - name: Load image to Docker
        if: github.event_name != 'pull_request'
        run: |
          docker load --input /tmp/${{ env.IMAGE_NAME }}.tar
          docker tag ${{ env.IMAGE_NAME }}:${{ steps.antragsgruen.outputs.version }}+${{ steps.container.outputs.version }} ${{ env.IMAGE_NAME }}:cloudsmith

      - name: Push to Cloudsmith
        if: github.event_name != 'pull_request'
        uses: cloudsmith-io/action@7af394e0f8add4867bce109385962dafecad1b8d # v0.6.14
        with:
          api-key: ${{ secrets.CLOUDSMITH_API_KEY }}
          command: "push"
          format: "docker"
          owner: "tielbeke"
          repo: "tielbeke"
          republish: true
          file: "${{ env.IMAGE_NAME }}:cloudsmith"
