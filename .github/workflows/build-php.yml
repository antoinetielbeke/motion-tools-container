name: Build PHP-FPM Container

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'php-fpm/**'
      - '.github/workflows/build-php.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'php-fpm/**'
      - '.github/workflows/build-php.yml'
  workflow_dispatch:
    inputs:
      antragsgruen_version:
        description: 'Antragsgruen version tag (e.g., v4.17-volt)'
        required: true
        default: 'v4.17-volt'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/motion-tools-php

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Antragsgruen version
        id: antragsgruen
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.antragsgruen_version }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep -oP 'ARG ANTRAGSGRUEN_VERSION=\K.*' php-fpm/Dockerfile | head -1 || echo "v4.17-volt")
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.description=PHP-FPM container for Antragsgruen with 12-factor env var support
            org.opencontainers.image.version={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./php-fpm
          file: ./php-fpm/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ANTRAGSGRUEN_VERSION=${{ steps.antragsgruen.outputs.version }}
            PHP_VERSION=8.4
          cache-from: type=gha
          cache-to: type=gha,mode=max
